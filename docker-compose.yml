services:
  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medvision-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 crud.wsgi:application"
    environment:
      DEBUG: "0"
      SECRET_KEY: "django-insecure-change-this-in-production-use-random-string"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000"
      DB_ENGINE: "django.db.backends.sqlite3"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_staticfiles:/app/staticfiles
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - medvision_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/history/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medvision-frontend
    environment:
      REACT_APP_API_BASE_URL: "http://localhost:8000/api"
      REACT_APP_ENV: "production"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - medvision_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (optional, for production-like setup)
  nginx:
    image: nginx:alpine
    container_name: medvision-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - medvision_network

volumes:
  backend_media:
  backend_staticfiles:
  backend_logs:

networks:
  medvision_network:
    driver: bridge
