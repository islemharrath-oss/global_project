services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: medvision-db
    environment:
      POSTGRES_DB: medvision_db
      POSTGRES_USER: medvision_user
      POSTGRES_PASSWORD: medvision_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - medvision_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medvision_user -d medvision_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database web UI
  adminer:
    image: adminer:4
    container_name: medvision-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - medvision_network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medvision-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --timeout 600 crud.wsgi:application"
    environment:
      DEBUG: "0"
      SECRET_KEY: "django-insecure-change-this-in-production-use-random-string"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "medvision_db"
      DB_USER: "medvision_user"
      DB_PASSWORD: "medvision_password"
      DB_HOST: "db"
      DB_PORT: "5432"
      AI_SERVICE_URL: "http://172.19.128.1:9000"
      AI_SERVICE_TIMEOUT: "600"
      AI_FALLBACK_TO_MOCK: "1"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_staticfiles:/app/staticfiles
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - medvision_network

    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medvision-frontend
    environment:
      REACT_APP_API_BASE_URL: "http://localhost:8000/api"
      REACT_APP_ENV: "production"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - medvision_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: medvision-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - medvision_network

volumes:
  postgres_data:
  backend_media:
  backend_staticfiles:
  backend_logs:

networks:
  medvision_network:
    driver: bridge

